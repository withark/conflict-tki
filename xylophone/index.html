<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>온라인 실로폰</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:linear-gradient(135deg,#fff4cf,#dff5ff);display:flex;align-items:center;justify-content:center;padding:14px;color:#222}.app{width:min(1000px,100%);text-align:center}h1{font-size:clamp(32px,8vw,64px);margin:0 0 8px;letter-spacing:-.06em}.desc{margin:0 0 14px;color:#555;font-size:16px;line-height:1.45}.btns{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}.btn{border:0;border-radius:999px;background:#fff;padding:12px 17px;font-weight:900;box-shadow:0 8px 18px #0002;font-size:15px}.frame{position:relative;border-radius:26px;padding:28px 10px 34px;background:linear-gradient(#a66b34,#70431e);box-shadow:0 24px 45px #0003;overflow:hidden}.rail{position:absolute;left:5%;right:5%;height:14px;border-radius:99px;background:linear-gradient(#d89c57,#70431e);z-index:0}.r1{top:32%}.r2{bottom:19%}.xylo{position:relative;z-index:1;display:flex;justify-content:center;align-items:flex-start;gap:clamp(5px,1.3vw,14px);min-height:410px}.bar{width:clamp(36px,9vw,88px);border:0;border-radius:16px;color:#fff;font-weight:1000;text-shadow:0 2px 3px #0006;box-shadow:0 17px 22px #0003,inset 0 8px 13px #fff5,inset 0 -12px 18px #0003;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:16px 6px;touch-action:manipulation}.bar:before,.bar:after{content:"";width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#aaa 45%,#444);box-shadow:0 2px 4px #0005}.bar.play{transform:translateY(8px) scale(.985);filter:brightness(1.12)}.note{font-size:clamp(22px,5vw,38px)}.key{font-size:13px;background:#ffffff33;border-radius:99px;padding:3px 8px}.bar:nth-child(1){height:390px;background:linear-gradient(#ff5555,#c91c1c)}.bar:nth-child(2){height:365px;background:linear-gradient(#ff8a34,#d95c00)}.bar:nth-child(3){height:340px;background:linear-gradient(#ffd447,#dea400)}.bar:nth-child(4){height:315px;background:linear-gradient(#5eda68,#209b30)}.bar:nth-child(5){height:290px;background:linear-gradient(#43c7ff,#147cc2)}.bar:nth-child(6){height:265px;background:linear-gradient(#4b7dff,#2442c9)}.bar:nth-child(7){height:240px;background:linear-gradient(#9f66ff,#6532c9)}.bar:nth-child(8){height:215px;background:linear-gradient(#ff66c7,#c9238c)}.status{font-size:14px;color:#555;line-height:1.55}.last{font-weight:1000;color:#111}@media(max-width:700px){body{padding:8px}.frame{padding:22px 7px 28px}.xylo{min-height:335px;gap:4px}.bar{width:calc((100vw - 54px)/8);min-width:34px;border-radius:12px;padding:12px 3px}.bar:before,.bar:after{width:10px;height:10px}.key{display:none}.bar:nth-child(1){height:320px}.bar:nth-child(2){height:300px}.bar:nth-child(3){height:280px}.bar:nth-child(4){height:260px}.bar:nth-child(5){height:240px}.bar:nth-child(6){height:220px}.bar:nth-child(7){height:200px}.bar:nth-child(8){height:180px}}</style></head><body><main class="app"><h1>온라인 실로폰</h1><p class="desc">막대를 터치하거나 키보드 1~8로 연주하세요.</p><div class="btns"><button class="btn" id="demo">동요 예시 연주</button><button class="btn" id="clear">마지막 음 지우기</button></div><section class="frame"><div class="rail r1"></div><div class="rail r2"></div><div class="xylo"><button class="bar" data-n="도" data-f="261.63" data-k="1"><span class="note">도</span><span class="key">1</span></button><button class="bar" data-n="레" data-f="293.66" data-k="2"><span class="note">레</span><span class="key">2</span></button><button class="bar" data-n="미" data-f="329.63" data-k="3"><span class="note">미</span><span class="key">3</span></button><button class="bar" data-n="파" data-f="349.23" data-k="4"><span class="note">파</span><span class="key">4</span></button><button class="bar" data-n="솔" data-f="392.00" data-k="5"><span class="note">솔</span><span class="key">5</span></button><button class="bar" data-n="라" data-f="440.00" data-k="6"><span class="note">라</span><span class="key">6</span></button><button class="bar" data-n="시" data-f="493.88" data-k="7"><span class="note">시</span><span class="key">7</span></button><button class="bar" data-n="도" data-f="523.25" data-k="8"><span class="note">도</span><span class="key">8</span></button></div></section><p class="status">마지막 연주음: <span class="last" id="last">없음</span><br>소리가 안 나면 화면을 한 번 터치한 뒤 다시 누르세요.</p></main><script>const bars=[...document.querySelectorAll('.bar')],last=document.getElementById('last'),demo=document.getElementById('demo'),clear=document.getElementById('clear');let ctx,playing=false;function ac(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx}function tone(freq,note,bar){const c=ac(),now=c.currentTime,out=c.createGain();out.gain.setValueAtTime(.0001,now);out.gain.exponentialRampToValueAtTime(.62,now+.012);out.gain.exponentialRampToValueAtTime(.001,now+1.05);out.connect(c.destination);[{r:1,g:.85},{r:2.72,g:.2},{r:5.31,g:.07}].forEach((p,i)=>{const o=c.createOscillator(),g=c.createGain();o.type=i?'triangle':'sine';o.frequency.setValueAtTime(freq*p.r,now);g.gain.setValueAtTime(p.g,now);g.gain.exponentialRampToValueAtTime(.001,now+.9+i*.12);o.connect(g);g.connect(out);o.start(now);o.stop(now+1.2)});bar.classList.remove('play');void bar.offsetWidth;bar.classList.add('play');setTimeout(()=>bar.classList.remove('play'),130);last.textContent=note}function hit(b){tone(+b.dataset.f,b.dataset.n,b)}bars.forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault();hit(b)}));addEventListener('keydown',e=>{if(e.repeat)return;const b=bars.find(x=>x.dataset.k===e.key);if(b)hit(b)});clear.onclick=()=>last.textContent='없음';demo.onclick=async()=>{if(playing)return;playing=true;demo.textContent='연주 중...';const m=[1,1,5,5,6,6,5,4,4,3,3,2,2,1,5,5,4,4,3,3,2,5,5,4,4,3,3,2,1,1,5,5,6,6,5,4,4,3,3,2,2,1];for(const x of m){hit(bars[x-1]);await new Promise(r=>setTimeout(r,310))}demo.textContent='동요 예시 연주';playing=false};</script></body></html>
