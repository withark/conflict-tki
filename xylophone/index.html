<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>소리 나는 온라인 실로폰</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:linear-gradient(135deg,#fff4cf,#dff5ff);display:flex;align-items:center;justify-content:center;padding:12px;color:#222}.app{width:min(1040px,100%);text-align:center}h1{font-size:clamp(30px,8vw,62px);margin:0 0 8px;letter-spacing:-.06em}.desc{margin:0 0 14px;color:#555;font-size:16px;line-height:1.45}.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}.btn{border:0;border-radius:999px;background:#fff;padding:13px 18px;font-weight:900;box-shadow:0 8px 18px #0002;font-size:15px}.sound{background:#111;color:#fff}.sound.on{background:#14a44d;color:#fff}.frame{position:relative;border-radius:26px;padding:28px 10px 34px;background:linear-gradient(#a66b34,#70431e);box-shadow:0 24px 45px #0003;overflow:hidden}.rail{position:absolute;left:5%;right:5%;height:14px;border-radius:99px;background:linear-gradient(#d89c57,#70431e);z-index:0}.r1{top:32%}.r2{bottom:19%}.xylo{position:relative;z-index:1;display:flex;justify-content:center;align-items:flex-start;gap:clamp(5px,1.3vw,14px);min-height:410px}.bar{width:clamp(36px,9vw,88px);border:0;border-radius:16px;color:#fff;font-weight:1000;text-shadow:0 2px 3px #0006;box-shadow:0 17px 22px #0003,inset 0 8px 13px #fff5,inset 0 -12px 18px #0003;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:16px 6px;touch-action:manipulation}.bar:before,.bar:after{content:"";width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#aaa 45%,#444);box-shadow:0 2px 4px #0005}.bar.play{transform:translateY(8px) scale(.985);filter:brightness(1.12)}.note{font-size:clamp(22px,5vw,38px)}.key{font-size:13px;background:#ffffff33;border-radius:99px;padding:3px 8px}.bar:nth-child(1){height:390px;background:linear-gradient(#ff5555,#c91c1c)}.bar:nth-child(2){height:365px;background:linear-gradient(#ff8a34,#d95c00)}.bar:nth-child(3){height:340px;background:linear-gradient(#ffd447,#dea400)}.bar:nth-child(4){height:315px;background:linear-gradient(#5eda68,#209b30)}.bar:nth-child(5){height:290px;background:linear-gradient(#43c7ff,#147cc2)}.bar:nth-child(6){height:265px;background:linear-gradient(#4b7dff,#2442c9)}.bar:nth-child(7){height:240px;background:linear-gradient(#9f66ff,#6532c9)}.bar:nth-child(8){height:215px;background:linear-gradient(#ff66c7,#c9238c)}.status{font-size:14px;color:#555;line-height:1.55;margin:14px 0 0}.last{font-weight:1000;color:#111}.warn{font-size:13px;color:#777;margin-top:6px}@media(max-width:700px){body{padding:8px}.frame{padding:22px 7px 28px}.xylo{min-height:335px;gap:4px}.bar{width:calc((100vw - 54px)/8);min-width:34px;border-radius:12px;padding:12px 3px}.bar:before,.bar:after{width:10px;height:10px}.key{display:none}.bar:nth-child(1){height:320px}.bar:nth-child(2){height:300px}.bar:nth-child(3){height:280px}.bar:nth-child(4){height:260px}.bar:nth-child(5){height:240px}.bar:nth-child(6){height:220px}.bar:nth-child(7){height:200px}.bar:nth-child(8){height:180px}}
</style>
</head>
<body>
<main class="app">
<h1>온라인 실로폰</h1>
<p class="desc">먼저 <b>🔊 소리 켜기</b>를 누른 뒤 막대를 터치하세요.</p>
<div class="btns"><button class="btn sound" id="soundBtn" type="button">🔊 소리 켜기</button><button class="btn" id="demo" type="button">동요 예시 연주</button><button class="btn" id="clear" type="button">마지막 음 지우기</button></div>
<section class="frame"><div class="rail r1"></div><div class="rail r2"></div><div class="xylo">
<button class="bar" data-n="도" data-f="261.63" data-k="1"><span class="note">도</span><span class="key">1</span></button>
<button class="bar" data-n="레" data-f="293.66" data-k="2"><span class="note">레</span><span class="key">2</span></button>
<button class="bar" data-n="미" data-f="329.63" data-k="3"><span class="note">미</span><span class="key">3</span></button>
<button class="bar" data-n="파" data-f="349.23" data-k="4"><span class="note">파</span><span class="key">4</span></button>
<button class="bar" data-n="솔" data-f="392.00" data-k="5"><span class="note">솔</span><span class="key">5</span></button>
<button class="bar" data-n="라" data-f="440.00" data-k="6"><span class="note">라</span><span class="key">6</span></button>
<button class="bar" data-n="시" data-f="493.88" data-k="7"><span class="note">시</span><span class="key">7</span></button>
<button class="bar" data-n="도" data-f="523.25" data-k="8"><span class="note">도</span><span class="key">8</span></button>
</div></section>
<p class="status">상태: <span class="last" id="state">소리 대기 중</span><br>마지막 연주음: <span class="last" id="last">없음</span></p>
<p class="warn">아이폰은 무음 모드/미디어 볼륨도 확인하세요. 처음에는 반드시 소리 켜기를 한 번 눌러야 합니다.</p>
</main>
<script>
const bars=[...document.querySelectorAll('.bar')];
const last=document.getElementById('last');
const state=document.getElementById('state');
const demo=document.getElementById('demo');
const clear=document.getElementById('clear');
const soundBtn=document.getElementById('soundBtn');
let ctx=null;
let unlocked=false;
let demoPlaying=false;
function makeCtx(){
  if(!ctx){ctx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});}
  return ctx;
}
async function unlock(){
  try{
    const c=makeCtx();
    if(c.state==='suspended') await c.resume();
    unlocked=true;
    state.textContent='소리 켜짐';
    soundBtn.textContent='✅ 소리 켜짐';
    soundBtn.classList.add('on');
    testClick();
    return true;
  }catch(e){
    state.textContent='소리 실행 실패';
    alert('브라우저에서 소리가 막혔습니다. Safari/Chrome에서 다시 열고, 볼륨과 무음 모드를 확인하세요.');
    return false;
  }
}
function testClick(){
  const c=makeCtx(),now=c.currentTime;
  const o=c.createOscillator(),g=c.createGain();
  o.type='sine';o.frequency.setValueAtTime(880,now);
  g.gain.setValueAtTime(0.0001,now);
  g.gain.exponentialRampToValueAtTime(0.25,now+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.13);
  o.connect(g);g.connect(c.destination);o.start(now);o.stop(now+0.16);
}
function tone(freq,note,bar){
  const c=makeCtx();
  if(c.state==='suspended'){state.textContent='소리 켜기를 눌러주세요';return;}
  const now=c.currentTime;
  const out=c.createGain();
  out.gain.setValueAtTime(0.0001,now);
  out.gain.exponentialRampToValueAtTime(0.9,now+0.01);
  out.gain.exponentialRampToValueAtTime(0.001,now+1.15);
  out.connect(c.destination);
  [{r:1,g:.85,t:'sine'},{r:2.75,g:.24,t:'triangle'},{r:5.38,g:.10,t:'sine'},{r:8.1,g:.04,t:'triangle'}].forEach((p,i)=>{
    const o=c.createOscillator();
    const g=c.createGain();
    o.type=p.t;
    o.frequency.setValueAtTime(freq*p.r,now);
    o.frequency.exponentialRampToValueAtTime(freq*p.r*0.996,now+0.5);
    g.gain.setValueAtTime(p.g,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.85+i*0.1);
    o.connect(g);g.connect(out);o.start(now);o.stop(now+1.25);
  });
  const noiseBuffer=c.createBuffer(1,Math.floor(c.sampleRate*0.035),c.sampleRate);
  const data=noiseBuffer.getChannelData(0);
  for(let i=0;i<data.length;i++){data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3)}
  const noise=c.createBufferSource();
  const ng=c.createGain();
  noise.buffer=noiseBuffer;
  ng.gain.setValueAtTime(0.09,now);
  ng.gain.exponentialRampToValueAtTime(0.001,now+0.035);
  noise.connect(ng);ng.connect(out);noise.start(now);noise.stop(now+0.04);
  bar.classList.remove('play');void bar.offsetWidth;bar.classList.add('play');
  setTimeout(()=>bar.classList.remove('play'),130);
  last.textContent=note;
  state.textContent='연주 중';
}
async function hit(bar){
  if(!unlocked){const ok=await unlock();if(!ok)return;}
  tone(+bar.dataset.f,bar.dataset.n,bar);
}
soundBtn.addEventListener('pointerdown',async e=>{e.preventDefault();await unlock();});
bars.forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault();hit(b);}));
window.addEventListener('keydown',e=>{if(e.repeat)return;const b=bars.find(x=>x.dataset.k===e.key);if(b)hit(b);});
clear.onclick=()=>{last.textContent='없음';state.textContent=unlocked?'소리 켜짐':'소리 대기 중';};
demo.onclick=async()=>{
  if(demoPlaying)return;
  if(!unlocked){const ok=await unlock();if(!ok)return;}
  demoPlaying=true;demo.textContent='연주 중...';
  const m=[1,1,5,5,6,6,5,4,4,3,3,2,2,1,5,5,4,4,3,3,2,5,5,4,4,3,3,2,1,1,5,5,6,6,5,4,4,3,3,2,2,1];
  const d=[280,280,280,280,280,280,560,280,280,280,280,280,280,650,280,280,280,280,280,280,650,280,280,280,280,280,280,650,280,280,280,280,280,280,560,280,280,280,280,280,280,720];
  for(let i=0;i<m.length;i++){tone(+bars[m[i]-1].dataset.f,bars[m[i]-1].dataset.n,bars[m[i]-1]);await new Promise(r=>setTimeout(r,d[i]));}
  demo.textContent='동요 예시 연주';demoPlaying=false;state.textContent='소리 켜짐';
};
</script>
</body>
</html>
